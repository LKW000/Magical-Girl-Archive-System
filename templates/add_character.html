<!DOCTYPE html>
<html>
<head>
    <title>Add Character</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <a class="button secondary" href="/">← Back Home</a>

        <h1>Add New Character</h1>
        <p>Add a new magical girl record to the archive.</p>

        <form method="POST" class="form-card">
            <label>Name</label>
            <input type="text" name="name" required>

            <label>Age</label>
            <input type="number" name="age" min="0" required>

            <label>Origin</label>
            <input type="text" name="origin">

            <label>Status</label>
            <select name="status" required>
                <option value="Active">Active</option>
                <option value="Unstable">Unstable</option>
                <option value="Critical">Critical</option>
                <option value="Corrupted">Corrupted</option>
            </select>

            <label>Stability Level</label>
            <input type="number" name="stability" min="0" max="100" required>

            <button type="submit" class="button">Add Character</button>
        </form>
    </div>
</body>
</html>
